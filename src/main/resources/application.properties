# =========================================================================
# ELISMESSENGER PRODUCTION CONFIGURATION FOR AMVERA CLOUD
# =========================================================================
spring.application.name=messenger
server.port=8080

# ? 1. DATABASE CONNECT: Target PostgreSQL cluster in Amvera cloud
spring.datasource.url=jdbc:postgresql://amvera-spinastya-cnpg-elis-db-rw:5432/Elismessenger

# ? 2. SECURE CREDENTIALS: Autowired via Amvera environment variables (System Env)
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ? ORM HIBERNATE SETTINGS: Auto-update tables schema inside cloud Postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ? VIEW WARNING DISABLE: Protect logs from trash open-in-view warnings
spring.jpa.open-in-view=false

# ? MULTIPART MEDIA SIZE CAP: Max file payload size for photos and heavy videos
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# =========================================================================
# ? PRODUCTION SMTP MAIL CONFIGURATION (GMAIL GATEWAY)
# =========================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=elismessenger@gmail.com

# ? App-specific 16-character crypto password from Google Account
spring.mail.password=${MAIL_PASSWORD}

# SMTP Security handshake protocols (STARTTLS required for Google)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
